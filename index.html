<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Movie Search · OMDb</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <h1 class="logo">Movie Search</h1>
        <form class="search-form" id="search-form" action="#" method="get" novalidate>
          <label class="visually-hidden" for="search-input">Movie title</label>
          <input
            type="search"
            id="search-input"
            name="q"
            autocomplete="off"
            placeholder="e.g. inception"
            maxlength="120"
          />
          <button type="submit" class="btn btn-primary" id="search-submit">Search</button>
        </form>
        <p class="search-hint">Tip: Use complete words for best results</p>
        <div class="filter-bar" role="group" aria-label="Search filters">
          <div class="filter-group">
            <label for="filter-type">Type</label>
            <select id="filter-type" name="type">
              <option value="">All</option>
              <option value="movie">Movie</option>
              <option value="series">Series</option>
              <option value="episode">Episode</option>
            </select>
          </div>
          <div class="filter-group">
            <label for="filter-year">Year</label>
            <input
              type="number"
              id="filter-year"
              name="year"
              inputmode="numeric"
              min="1895"
              max="2100"
              step="1"
              placeholder="Any"
              aria-label="Release year (optional)"
            />
          </div>
          <div class="filter-group">
            <label for="filter-sort">Sort</label>
            <select id="filter-sort" name="sort">
              <option value="">Relevance</option>
              <option value="year-desc">Newest first</option>
              <option value="year-asc">Oldest first</option>
              <option value="title-asc">A &rarr; Z</option>
            </select>
          </div>
        </div>
        <div id="active-filters" class="active-filters" hidden aria-label="Active filters"></div>
      </div>
    </header>

    <main class="site-main">
      <div id="status-region" class="status-region" aria-live="polite" aria-atomic="true"></div>
      <div id="results-meta" class="results-meta" hidden>
        <span id="results-count" class="results-count"></span>
      </div>
      <div id="results" class="results" role="region" aria-label="Search results"></div>
    </main>

    <footer class="site-footer">
      <p>Data provided by <a href="https://www.omdbapi.com" target="_blank" rel="noopener noreferrer" style="color:inherit">OMDb API</a></p>
    </footer>

    <div id="modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
      <div class="modal-backdrop" data-close-modal tabindex="-1"></div>
      <div class="modal-panel">
        <button type="button" class="modal-close" data-close-modal aria-label="Close">&times;</button>
        <div id="modal-body" class="modal-body"></div>
      </div>
    </div>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
